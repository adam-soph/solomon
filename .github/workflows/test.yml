name: Test

# The full test suite. Run it on its own (Actions tab / `gh workflow run Test`), and
# it is also reused as the gate at the front of the Release workflow (`workflow_call`).
#
# One leg per native execution target. The tests are host-gated (no Docker, no QEMU):
# each backend's *execution* tests run only on a matching host and self-skip elsewhere,
# so the matrix below is what actually runs the whole suite —
#   • linux-x86_64  → executes the freestanding x86-64 static ELFs
#   • linux-aarch64 → executes the freestanding aarch64 static ELFs
#   • macos-aarch64 → links + executes the arm64 Mach-O binaries (via `cc`)
# Their union exercises every code generator against the interpreter (the oracle).
# Building on each OS also compile-checks the per-target `cfg`-gated paths.
on:
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
          - name: linux-aarch64
            os: ubuntu-24.04-arm
          - name: macos-aarch64
            os: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # `cargo build` is the warning-free bar (clippy's stylistic lints are not
      # enforced); -D warnings makes any new compiler warning fail the build.
      - name: Build (warning-free)
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build --bins

      # The full suite — including the native-backend conformance tests that hold
      # every code generator byte-for-byte to the interpreter. The execution tests
      # for *this* runner's target run natively; the others self-skip (covered by
      # their own matrix leg).
      - name: Test
        run: cargo test
