name: Release

# Run the full test suite, then — only if it passes — build the release binaries for
# every supported OS/arch on a matching **native** GitHub runner (no Docker, no
# cross-emulation) and publish them to a GitHub release. Trigger by pushing a version
# tag (`git tag v1.2.3 && git push --tags`) or run it manually from the Actions tab,
# supplying the tag. (This supersedes the old `CI` workflow and the local
# `make release`, which cross-compiled the foreign targets under emulated Docker.)
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create/upload to (e.g. v0.1.0)'
        required: true

permissions:
  contents: write # create the release + upload assets

jobs:
  # Gate the whole release on the full test suite (the Test workflow, reused) — every
  # code generator held byte-for-byte to the interpreter across the native runners.
  # Nothing builds or publishes unless this passes.
  test:
    uses: ./.github/workflows/test.yml

  # One leg per target, each on a runner whose OS/arch matches so the build is native.
  build:
    name: ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: x86_64-unknown-linux-musl, os: ubuntu-latest, apt: musl-tools }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-24.04-arm }
          - { target: aarch64-apple-darwin, os: macos-15 }
          - { target: x86_64-apple-darwin, os: macos-15 }
          # Windows host binaries (msvc, statically linked so the .exe is standalone).
          - { target: x86_64-pc-windows-msvc, os: windows-latest, ext: .exe, rustflags: -C target-feature=+crt-static }
          - { target: i686-pc-windows-msvc, os: windows-latest, ext: .exe, rustflags: -C target-feature=+crt-static }
    env:
      RUSTFLAGS: ${{ matrix.rustflags }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install build deps
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      # Stage both binaries named per target (the stdlib is embedded at build time, so
      # each binary is self-contained — nothing else to ship). `bash` is available on
      # every runner including Windows, so one script covers all.
      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          for b in hcc hci; do
            cp "target/${{ matrix.target }}/release/$b${{ matrix.ext }}" \
               "dist/$b-${{ matrix.target }}${{ matrix.ext }}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # macOS universal (arm64 + x86_64) fat binary, lipo'd from the two Apple artifacts.
  universal:
    name: macos-universal
    needs: build
    runs-on: macos-15
    steps:
      - uses: actions/download-artifact@v4
        with: { name: bin-aarch64-apple-darwin, path: arm64 }
      - uses: actions/download-artifact@v4
        with: { name: bin-x86_64-apple-darwin, path: x86_64 }
      - name: lipo
        run: |
          mkdir -p dist
          for b in hcc hci; do
            lipo -create -output "dist/$b-macos-universal" \
              "arm64/$b-aarch64-apple-darwin" "x86_64/$b-x86_64-apple-darwin"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: bin-macos-universal
          path: dist/*
          if-no-files-found: error

  # Collect every artifact and publish (or append to) the release for the tag.
  publish:
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Create or update the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          ls -la dist
          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "uploading to existing release $TAG"
            gh release upload "$TAG" dist/* --clobber -R "$GITHUB_REPOSITORY"
          else
            echo "creating release $TAG"
            gh release create "$TAG" dist/* --title "$TAG" --generate-notes -R "$GITHUB_REPOSITORY"
          fi
